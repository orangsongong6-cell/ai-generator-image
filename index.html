<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Prompt AI Gratis & Akurat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .overlay-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 85%;
            max-width: 400px;
            text-align: center;
            margin: 20px;
        }

        h2 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 22px;
        }

        .upload-box {
            border: 2px dashed #38bdf8;
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 20px 0;
            transition: 0.3s;
            background: rgba(56, 189, 248, 0.05);
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .upload-box:hover {
            background: rgba(56, 189, 248, 0.15);
        }

        #preview {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
            display: none;
        }

        .btn-submit {
            background: #0284c7;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-submit:hover {
            background: #0369a1;
        }

        .btn-submit:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 20px;
            text-align: left;
        }

        label {
            font-size: 14px;
            color: #94a3b8;
            display: block;
            margin-bottom: 5px;
        }

        textarea {
            width: 100%;
            height: 130px;
            background: #0f172a;
            color: #f1f5f9;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="overlay-card">
        <h2>AI Prompt Generator</h2>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 10px;">100% Gratis - Unggah foto referensi untuk dianalisis oleh AI secara otomatis</p>
        
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <span id="uploadText">Upload Foto Di Sini</span>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewImage(event)">
            <img id="preview" alt="Pratinjau Foto">
        </div>

        <button id="btnGenerate" class="btn-submit" onclick="generatePrompt()">UPLOAD / GENERATE</button>

        <div class="result-box">
            <label for="promptOutput">Prompt Hasil Analisis :</label>
            <textarea id="promptOutput" placeholder="Hasil prompt asli AI akan muncul di sini setelah di-upload..." readonly></textarea>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "AQ.Ab8RN6JwJhHe-Xx_4njdV-KM1QWdJ3rRuSBLrmo5CwSedvMfxg"; 

        let base64Image = "";
        let mimeType = "";

        function previewImage(event) {
            const input = event.target;
            const preview = document.getElementById('preview');
            const uploadText = document.getElementById('uploadText');

            if (input.files && input.files[0]) {
                const file = input.files[0];
                mimeType = file.type;
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    uploadText.style.display = 'none';
                    
                    base64Image = e.target.result.split(',')[1];
                }
                reader.readAsDataURL(file);
            }
        }

        async function generatePrompt() {
            const output = document.getElementById('promptOutput');
            const btn = document.getElementById('btnGenerate');

            if (!base64Image) {
                alert("Silakan masukkan foto referensi terlebih dahulu!");
                return;
            }

            output.value = "AI sedang membaca foto, menganalisis pose, dan latar belakang... Mohon tunggu...";
            btn.disabled = true;

            const instruksiRahasia = "Analisis foto ini dengan sangat teliti. Buatlah prompt gambar AI yang sangat mendetail dalam Bahasa Indonesia. Deskripsikan secara rinci tentang: 1. Subjek/Objek utama dan posenya secara spesifik, 2. Pakaian atau warna objek, 3. Latar belakang tempat (background), situasi, dan suasana sekitar secara detail, 4. Pencahayaan dan sudut pengambilan gambar. Buat hasilnya langsung berupa teks prompt siap pakai, padat, jelas, dan tanpa kalimat pembuka seperti 'Ini adalah prompt'.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: instruksiRahasia },
                                { inlineData: { mimeType: mimeType, data: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    output.value = data.candidates[0].content.parts[0].text.trim();
                } else {
                    output.value = "Gagal memproses gambar. Pastikan format gambar benar atau periksa API Key kamu.";
                }
            } catch (error) {
                console.error(error);
                output.value = "Terjadi kesalahan jaringan atau API Key tidak valid. Silakan coba lagi.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
  </html>
